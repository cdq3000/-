<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>骏延集团·陪跑复盘管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg1:#0a0e27;--bg2:#111633;--bg3:#1a1f3a;--bg4:#222845;
  --accent:#00d4ff;--accent2:#7b2ff7;--green:#00ff88;--orange:#ff9f43;--red:#ff6b6b;--pink:#e8a0bf;
  --t1:#e8eaf6;--t2:#a0b0cc;--t3:#5a6a8a;
  --rad:10px;--glow:0 0 20px rgba(0,212,255,.12);
}
html,body{height:100%;font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:var(--bg1);color:var(--t1);overflow:hidden;}
.topbar{height:54px;background:linear-gradient(90deg,#0d1033 0%,#161b40 100%);display:flex;align-items:center;padding:0 24px;border-bottom:1px solid #1e2448;position:relative;z-index:100;}
.topbar .logo{font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.topbar .tabs{display:flex;gap:4px;margin-left:40px;}
.topbar .tabs button{background:none;border:none;color:var(--t2);font-size:13.5px;padding:7px 18px;border-radius:20px;cursor:pointer;transition:.2s;font-family:inherit;}
.topbar .tabs button:hover{background:var(--bg3);color:var(--t1);}
.topbar .tabs button.active{background:linear-gradient(135deg,rgba(0,212,255,.18),rgba(123,47,247,.18));color:var(--accent);font-weight:600;}
.topbar .right{margin-left:auto;display:flex;align-items:center;gap:14px;font-size:12.5px;color:var(--t2);}
.topbar .right .badge{background:var(--accent);color:#000;font-weight:700;border-radius:10px;padding:1px 8px;font-size:11px;}
.topbar .right .sync-dot{width:8px;height:8px;border-radius:50%;background:var(--green);}
.topbar .right .sync-dot.syncing{background:var(--orange);animation:pulse .8s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.main{height:calc(100% - 54px);overflow-y:auto;padding:20px 24px;}
.main::-webkit-scrollbar{width:5px;}
.main::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px;}
.page{display:none;animation:fadeIn .3s;}
.page.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

.store-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;}
.store-card{background:var(--bg2);border:1px solid #1e2744;border-radius:var(--rad);padding:18px 20px;cursor:pointer;transition:.25s;position:relative;overflow:hidden;}
.store-card:hover{border-color:var(--accent);box-shadow:var(--glow);transform:translateY(-2px);}
.store-card .brand-bar{position:absolute;top:0;left:0;width:4px;height:100%;border-radius:var(--rad) 0 0 var(--rad);}
.store-card .header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.store-card .name{font-size:15.5px;font-weight:700;}
.store-card .brand-tag{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;}
.store-card .info-row{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--t2);margin-bottom:6px;}
.store-card .info-row .icon{width:16px;text-align:center;}
.store-card .status-row{display:flex;gap:8px;margin-top:12px;}
.store-card .st-badge{font-size:11px;padding:3px 10px;border-radius:10px;font-weight:600;}
.st-badge.done{background:rgba(0,255,136,.12);color:var(--green);}
.st-badge.pending{background:rgba(255,159,67,.12);color:var(--orange);}
.st-badge.none{background:rgba(90,106,138,.15);color:var(--t3);}
.store-card .last-review{font-size:11.5px;color:var(--t3);margin-top:8px;}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:none;justify-content:center;align-items:flex-start;padding-top:40px;}
.overlay.active{display:flex;}
.detail-panel{background:var(--bg2);border:1px solid #1e2744;border-radius:14px;width:820px;max-height:88vh;overflow-y:auto;padding:0;animation:slideUp .3s;}
@keyframes slideUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:none;}}
.detail-panel .d-header{position:sticky;top:0;background:var(--bg2);z-index:2;padding:18px 24px 14px;border-bottom:1px solid #1e2744;display:flex;align-items:center;justify-content:space-between;}
.detail-panel .d-header .d-title{font-size:17px;font-weight:700;}
.detail-panel .d-header .close-btn{background:none;border:1px solid #2a3055;color:var(--t2);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.detail-panel .d-body{padding:18px 24px 24px;}
.detail-panel .section{margin-bottom:20px;}
.detail-panel .section-title{font-size:13.5px;font-weight:700;color:var(--accent);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #1a2240;}

.checklist .cl-item{display:flex;align-items:flex-start;gap:8px;padding:7px 0;font-size:13px;color:var(--t1);border-bottom:1px solid rgba(255,255,255,.03);}
.checklist .cl-item input[type=checkbox]{margin-top:2px;accent-color:var(--accent);width:15px;height:15px;flex-shrink:0;}
.checklist .cl-item .cl-cat{font-size:10.5px;color:var(--accent2);background:rgba(123,47,247,.1);padding:1px 6px;border-radius:4px;margin-right:4px;flex-shrink:0;}
.cl-item.checked{opacity:.45;text-decoration:line-through;}

.memo-section .memo-tabs{display:flex;gap:4px;margin-bottom:12px;}
.memo-section .memo-tabs button{background:var(--bg3);border:1px solid #2a3055;color:var(--t2);font-size:12px;padding:5px 14px;border-radius:8px;cursor:pointer;font-family:inherit;}
.memo-section .memo-tabs button.active{background:rgba(0,212,255,.12);border-color:var(--accent);color:var(--accent);}
.memo-block{background:var(--bg3);border:1px solid #1e2744;border-radius:var(--rad);padding:14px;}
.memo-block label{font-size:12px;color:var(--t2);display:block;margin-bottom:5px;}
.memo-block input,.memo-block textarea,.memo-block select{width:100%;background:var(--bg1);border:1px solid #2a3055;color:var(--t1);border-radius:8px;padding:8px 12px;font-size:13px;font-family:inherit;outline:none;transition:.2s;}
.memo-block input:focus,.memo-block textarea:focus,.memo-block select:focus{border-color:var(--accent);}
.memo-block textarea{resize:vertical;min-height:100px;}
.memo-block .row{display:flex;gap:10px;margin-bottom:10px;}
.memo-block .row>div{flex:1;}
.memo-block .save-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;font-weight:700;border:none;padding:8px 28px;border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit;margin-top:8px;transition:.2s;}
.memo-block .save-btn:hover{opacity:.85;}
.memo-block .save-btn:disabled{opacity:.5;cursor:not-allowed;}
.memo-history .h-item{background:var(--bg3);border:1px solid #1e2744;border-radius:var(--rad);padding:12px 14px;margin-bottom:8px;}
.memo-history .h-item .h-date{font-size:11.5px;color:var(--accent);font-weight:600;}
.memo-history .h-item .h-type{font-size:10.5px;padding:1px 6px;border-radius:4px;margin-left:8px;}
.h-type.pre{background:rgba(123,47,247,.12);color:var(--accent2);}
.h-type.post{background:rgba(0,255,136,.1);color:var(--green);}
.memo-history .h-item .h-summary{font-size:12.5px;color:var(--t2);margin-top:5px;line-height:1.5;}
.memo-history .h-item .h-expand{font-size:12px;color:var(--accent);cursor:pointer;margin-top:5px;display:inline-block;}
.memo-history .h-item .h-full{font-size:12.5px;color:var(--t1);margin-top:7px;line-height:1.6;display:none;white-space:pre-wrap;}

.record-filter{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.record-filter select,.record-filter input{background:var(--bg3);border:1px solid #2a3055;color:var(--t1);border-radius:8px;padding:6px 12px;font-size:12.5px;font-family:inherit;}
.record-filter select:focus,.record-filter input:focus{border-color:var(--accent);outline:none;}
.record-list .r-item{background:var(--bg2);border:1px solid #1e2744;border-radius:var(--rad);padding:14px 18px;margin-bottom:10px;display:flex;align-items:flex-start;gap:14px;transition:.2s;}
.record-list .r-item:hover{border-color:#2a4060;}
.r-item .r-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0;}
.r-item .r-info{flex:1;}
.r-item .r-info .r-title{font-size:14px;font-weight:600;margin-bottom:3px;}
.r-item .r-info .r-meta{font-size:11.5px;color:var(--t3);}
.r-item .r-info .r-snippet{font-size:12.5px;color:var(--t2);margin-top:5px;line-height:1.5;}
.r-item .r-badge{font-size:11px;padding:2px 10px;border-radius:10px;flex-shrink:0;font-weight:600;}
.r-item .r-actions{display:flex;gap:5px;flex-shrink:0;}
.r-item .btn-sm{background:none;border:1px solid #2a3055;color:var(--t2);font-size:11px;padding:3px 10px;border-radius:6px;cursor:pointer;font-family:inherit;}
.r-item .btn-sm:hover{border-color:var(--accent);color:var(--accent);}

.feed-section{background:var(--bg2);border:1px solid #1e2744;border-radius:12px;padding:20px;}
.feed-section .f-row{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap;}
.feed-section .f-row>div{flex:1;min-width:180px;}
.feed-section label{font-size:12px;color:var(--t2);display:block;margin-bottom:5px;font-weight:600;}
.feed-section select,.feed-section input,.feed-section textarea{width:100%;background:var(--bg3);border:1px solid #2a3055;color:var(--t1);border-radius:8px;padding:8px 12px;font-size:13px;font-family:inherit;outline:none;transition:.2s;}
.feed-section select:focus,.feed-section input:focus,.feed-section textarea:focus{border-color:var(--accent);}
.feed-section textarea{resize:vertical;min-height:160px;}
.feed-section .parse-btn{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;font-weight:700;border:none;padding:9px 32px;border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit;transition:.2s;}
.feed-section .parse-btn:hover{opacity:.85;}
.feed-section .parse-btn:disabled{opacity:.5;cursor:not-allowed;}
.feed-section .hint{font-size:11.5px;color:var(--t3);margin-top:8px;line-height:1.6;}

.empty{text-align:center;padding:50px 20px;color:var(--t3);font-size:13.5px;}
.empty .icon{font-size:36px;margin-bottom:10px;opacity:.4;}

.stats-row{display:flex;gap:14px;margin-bottom:18px;}
.stats-row .stat-card{background:var(--bg2);border:1px solid #1e2744;border-radius:var(--rad);padding:12px 18px;flex:1;}
.stats-row .stat-card .sc-val{font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.stats-row .stat-card .sc-label{font-size:11.5px;color:var(--t2);margin-top:2px;}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#000;font-weight:700;padding:10px 24px;border-radius:20px;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.error{background:var(--red);color:#fff;}
.toast.show{opacity:1;}

.token-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:none;justify-content:center;align-items:center;}
.token-overlay.active{display:flex;}
.token-dialog{background:var(--bg2);border:1px solid #1e2744;border-radius:14px;width:480px;padding:24px;}
.token-dialog h3{font-size:16px;margin-bottom:8px;}
.token-dialog p{font-size:12.5px;color:var(--t2);margin-bottom:14px;line-height:1.6;}
.token-dialog input{width:100%;background:var(--bg1);border:1px solid #2a3055;color:var(--t1);border-radius:8px;padding:10px 14px;font-size:13px;font-family:monospace;outline:none;margin-bottom:14px;}
.token-dialog input:focus{border-color:var(--accent);}
.token-dialog .btn-row{display:flex;gap:8px;justify-content:flex-end;}
.token-dialog .btn-row button{padding:8px 20px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;border:none;}
.token-dialog .btn-save{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;font-weight:700;}
.token-dialog .btn-clear{background:var(--bg3);border:1px solid #2a3055;color:var(--t2);}
.token-dialog .btn-close{background:none;color:var(--t3);}
.token-dialog .status{font-size:12px;margin-bottom:10px;}
.token-dialog .status.ok{color:var(--green);}
.token-dialog .status.none{color:var(--t3);}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">骏延集团 · 陪跑复盘管理</div>
  <div class="tabs">
    <button class="active" onclick="switchTab('stores')">🏪 门店列表</button>
    <button onclick="switchTab('schedule')">📅 排班日历</button>
    <button onclick="switchTab('records')">📝 复盘记录</button>
    <button onclick="switchTab('feed')">📥 投喂纪要</button>
  </div>
  <div class="right">
    <span id="syncLabel">同步中...</span>
    <span class="sync-dot" id="syncDot"></span>
    <span>本月复盘 <span class="badge" id="headerCount">0/7</span></span>
    <span id="headerDate"></span>
    <button onclick="showTokenDialog()" style="background:var(--bg3);border:1px solid #2a3055;color:var(--t2);font-size:11px;padding:3px 10px;border-radius:6px;cursor:pointer;font-family:inherit;" title="设置 GitHub Token">🔑 设置Token</button>
  </div>
</div>

<div class="main">
  <!-- 门店列表页 -->
  <div class="page active" id="pageStores">
    <div class="stats-row">
      <div class="stat-card"><div class="sc-val" id="stTotal">7</div><div class="sc-label">陪跑门店</div></div>
      <div class="stat-card"><div class="sc-val" id="stDone">0</div><div class="sc-label">本月已复盘</div></div>
      <div class="stat-card"><div class="sc-val" id="stPending">0</div><div class="sc-label">待复盘</div></div>
      <div class="stat-card"><div class="sc-val" id="stRate">0%</div><div class="sc-label">复盘完成率</div></div>
    </div>
    <div class="store-grid" id="storeGrid"></div>
  </div>

  <!-- 排班日历页 -->
  <div class="page" id="pageSchedule">
    <div class="stats-row">
      <div class="stat-card"><div class="sc-val" id="schTotal">7</div><div class="sc-label">已排班门店</div></div>
      <div class="stat-card"><div class="sc-val" id="schThisMonth">0</div><div class="sc-label">本月排班次数</div></div>
      <div class="stat-card"><div class="sc-val" id="schNext">0</div><div class="sc-label">本月已完成</div></div>
    </div>
    <div class="schedule-intro" style="margin-bottom:14px;color:var(--t2);font-size:12.5px;">
      💡 直接在卡片下方输入预约日期，点"✅ 预约"立即保存到云端。可随时修改状态。
    </div>
    <div class="store-grid" id="scheduleGrid"></div>
  </div>

  <!-- 复盘记录页 -->
  <div class="page" id="pageRecords">
    <div class="record-filter">
      <div><label>筛选门店</label><select id="filterStore" onchange="renderRecords()"><option value="">全部门店</option></select></div>
      <div><label>类型</label><select id="filterType" onchange="renderRecords()"><option value="">全部</option><option value="pre">会前大纲</option><option value="post">会后纪要</option></select></div>
      <div><label>月份</label><input type="month" id="filterMonth" onchange="renderRecords()"></div>
    </div>
    <div class="record-list" id="recordList"></div>
  </div>

  <!-- 投喂纪要页 -->
  <div class="page" id="pageFeed">
    <div class="feed-section">
      <h3 style="margin-bottom:14px;font-size:15px;">📥 粘贴会议纪要，自动归档到云端</h3>
      <div class="f-row">
        <div><label>门店 *</label><select id="feedStore"></select></div>
        <div><label>日期 *</label><input type="text" id="feedDate" placeholder="如：6月11日"></div>
        <div><label>类型 *</label><select id="feedType"><option value="pre">会前大纲</option><option value="post">会后纪要</option></select></div>
      </div>
      <div style="margin-bottom:14px;">
        <label>会议纪要内容</label>
        <textarea id="feedContent" placeholder="在此粘贴会议纪要内容..."></textarea>
      </div>
      <div style="display:flex;gap:10px;align-items:center;">
        <button class="parse-btn" onclick="saveFeed()">📌 保存纪要</button>
        <span id="feedMsg" style="font-size:12.5px;"></span>
      </div>
    </div>
  </div>
</div>

<!-- 门店详情弹层 -->
<div class="overlay" id="overlay">
  <div class="detail-panel">
    <div class="d-header">
      <div class="d-title" id="dTitle">—</div>
      <button class="close-btn" onclick="closeDetail()">✕</button>
    </div>
    <div class="d-body">
      <div class="section"><div class="section-title">📋 基本信息</div><div id="dInfo" style="font-size:13px;color:var(--t2);line-height:1.8;"></div></div>
      <div class="section"><div class="section-title">✅ 本周点检清单</div><div class="checklist" id="dChecklist"></div></div>
      <div class="section memo-section">
        <div class="section-title">📝 复盘纪要</div>
        <div class="memo-tabs">
          <button class="active" onclick="switchMemoTab('pre',this)">📋 会前大纲</button>
          <button onclick="switchMemoTab('post',this)">📝 会后纪要</button>
          <button onclick="switchMemoTab('history',this)">📂 历史记录</button>
        </div>
        <div class="memo-block" id="memoPre">
          <div class="row"><div><label>日期（自由填写）</label><input type="text" id="preDate" placeholder="如：6月11日"></div><div><label>状态</label><select id="preStatus"><option value="pending">⏳ 待复盘</option><option value="done">✅ 已完成</option><option value="cancelled">❌ 已取消</option></select></div></div>
          <div style="margin-bottom:10px;"><label>大纲内容</label><textarea id="preContent" placeholder="例：1. 上周直播数据回顾 2. 短视频发布情况 3. 线索跟进检查..."></textarea></div>
          <button class="save-btn" id="preSaveBtn" onclick="savePreMemo()">💾 保存大纲</button>
          <span id="preMsg" style="font-size:12.5px;margin-left:10px;"></span>
        </div>
        <div class="memo-block" id="memoPost" style="display:none;">
          <div class="row"><div><label>日期（自由填写）</label><input type="text" id="postDate" placeholder="如：6月11日"></div><div><label>状态</label><select id="postStatus"><option value="done">✅ 已完成</option><option value="pending">⏳ 待复盘</option><option value="cancelled">❌ 已取消</option></select></div></div>
          <div style="margin-bottom:10px;"><label>会议纪要</label><textarea id="postContent" placeholder="【复盘结论】...【发现问题】...【待办事项】..."></textarea></div>
          <button class="save-btn" id="postSaveBtn" onclick="savePostMemo()">💾 保存纪要</button>
          <span id="postMsg" style="font-size:12.5px;margin-left:10px;"></span>
        </div>
        <div class="memo-history" id="memoHistory" style="display:none;"></div>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Token 配置弹窗 -->
<div class="token-overlay" id="tokenOverlay">
  <div class="token-dialog">
    <h3>🔑 GitHub Token 配置</h3>
    <p>写入数据需要 GitHub Token（读取不需要）。Token 仅保存在你的浏览器中，不会上传到任何地方。<br>去 <a href="https://github.com/settings/tokens" target="_blank" style="color:var(--accent);">github.com/settings/tokens</a> 生成，勾选 <b>gist</b> 权限即可。</p>
    <div class="status" id="tokenStatus"></div>
    <input type="password" id="tokenInput" placeholder="粘贴 Token...">
    <div class="btn-row">
      <button class="btn-clear" onclick="clearToken()">清除</button>
      <button class="btn-close" onclick="closeTokenDialog()">取消</button>
      <button class="btn-save" onclick="saveToken()">💾 保存</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  GitHub Gist API 数据层
// ═══════════════════════════════════════════
const GIST_ID = '69495eeba22b7ec386e6663e5dd6fb0b';
const GIST_FILENAME = 'peipao-data.json';
const GIST_RAW = 'https://gist.githubusercontent.com/cdq3000/' + GIST_ID + '/raw/' + GIST_FILENAME;
const API_BASE = 'https://api.github.com/gists/' + GIST_ID;

// Token 从 localStorage 读取，不在代码里写死
function getToken() { return localStorage.getItem('gist_token') || ''; }
function setToken(t) { localStorage.setItem('gist_token', t); }

function authHeaders() {
  const t = getToken();
  return t ? {
    'Authorization': 'Bearer ' + t,
    'Accept': 'application/vnd.github+json',
    'X-GitHub-Api-Version': '2022-11-28'
  } : null;
}

// 本地内存缓存
let _schedule = {};
let _records = [];
let _lastUpdated = '';

function setSyncStatus(status) {
  const dot = document.getElementById('syncDot');
  const label = document.getElementById('syncLabel');
  dot.className = 'sync-dot' + (status === 'syncing' ? ' syncing' : '');
  if (status === 'ok') label.textContent = '已同步';
  else if (status === 'syncing') label.textContent = '同步中...';
  else if (status === 'no_token') label.textContent = '需配置';
  else label.textContent = '离线';
}

// 从 Gist 读取数据（公开 Gist，无需 Token）
async function fetchFromGist() {
  setSyncStatus('syncing');
  try {
    // 用 raw URL 读取，无需认证
    const resp = await fetch(GIST_RAW + '?t=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    _schedule = data.schedule || {};
    _records = data.records || [];
    _lastUpdated = data.lastUpdated || '';
    setSyncStatus(getToken() ? 'ok' : 'no_token');
    return true;
  } catch (e) {
    console.error('Fetch failed:', e);
    setSyncStatus('error');
    showToast('⚠️ 数据加载失败，请检查网络', true);
    return false;
  }
}

// 写回 Gist（需要 Token）
async function pushToGist() {
  if (!getToken()) {
    showToast('⚠️ 请先点击右上角"设置Token"', true);
    return false;
  }
  setSyncStatus('syncing');
  const data = {
    schedule: _schedule,
    records: _records,
    lastUpdated: new Date().toISOString()
  };
  const body = JSON.stringify({
    files: { [GIST_FILENAME]: { content: JSON.stringify(data) } }
  });
  try {
    const resp = await fetch(API_BASE, {
      method: 'PATCH',
      headers: { ...authHeaders(), 'Content-Type': 'application/json' },
      body
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    _lastUpdated = data.lastUpdated;
    setSyncStatus('ok');
    return true;
  } catch (e) {
    console.error('Push failed:', e);
    setSyncStatus('error');
    showToast('⚠️ 保存失败，请检查网络', true);
    return false;
  }
}

// 静默刷新（定时同步，读数据不需要 Token）
async function silentRefresh() {
  try {
    const resp = await fetch(GIST_RAW + '?t=' + Date.now());
    if (!resp.ok) return;
    const data = await resp.json();
    if (data.lastUpdated !== _lastUpdated) {
      _schedule = data.schedule || {};
      _records = data.records || [];
      _lastUpdated = data.lastUpdated || '';
      refreshUI();
    }
    setSyncStatus(getToken() ? 'ok' : 'no_token');
  } catch (e) { /* silent */ }
}

// Toast
function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => t.classList.remove('show'), 2500);
}

// 全量刷新 UI
function refreshUI() {
  if (document.getElementById('pageStores').classList.contains('active')) renderStores();
  if (document.getElementById('pageSchedule').classList.contains('active')) renderSchedule();
  if (document.getElementById('pageRecords').classList.contains('active')) renderRecords();
  // 更新 header 统计
  const curMonth = new Date().toISOString().slice(0,7);
  let doneCnt = 0;
  STORES.forEach(s => {
    const storeRecs = _records.filter(r => r.store === s.name && r.date && r.date.startsWith(curMonth));
    if (storeRecs.some(r => r.status === 'done')) doneCnt++;
  });
  document.getElementById('headerCount').textContent = doneCnt + '/' + STORES.length;
}

function switchTab(tab) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));

  const pageId = 'page' + tab.charAt(0).toUpperCase() + tab.slice(1);
  document.getElementById(pageId).classList.add('active');
  if (event && event.currentTarget) event.currentTarget.classList.add('active');
  if (tab === 'schedule') renderSchedule();
  if (tab === 'records') renderRecords();
  if (tab === 'feed') populateFeedForm();
}

function renderStores() {
  const grid = document.getElementById('storeGrid');
  grid.innerHTML = '';
  let doneCnt = 0;
  const curMonth = new Date().toISOString().slice(0,7);
  STORES.forEach((s, i) => {
    const brand = BRANDS[s.brand] || BRANDS['广本'];
    const storeRecs = _records.filter(r => r.store === s.name && r.date && r.date.startsWith(curMonth));
    const hasDone = storeRecs.some(r => r.status === 'done');
    const hasPending = storeRecs.some(r => r.status === 'pending');
    let st = 'none', stLabel = '未排期';
    if (hasDone) { st = 'done'; stLabel = '已复盘'; doneCnt++; }
    else if (hasPending) { st = 'pending'; stLabel = '待复盘'; }
    const lastRec = storeRecs.length > 0 ? storeRecs[storeRecs.length - 1] : null;
    const card = document.createElement('div');
    card.className = 'store-card';
    card.onclick = () => openDetail(i);
    card.innerHTML = `
      <div class="brand-bar" style="background:${brand.color}"></div>
      <div class="header"><span class="name">${s.name}</span><span class="brand-tag" style="background:${brand.bg};color:${brand.color}">${s.brand}</span></div>
      <div class="info-row"><span class="icon">📅</span>每周${s.day}（时间以老师预约为准）</div>
      <div class="info-row"><span class="icon">👩🏫</span>${s.teachers}</div>
      <div class="info-row"><span class="icon">📋</span>每日${s.daily.length}项 / 每周${Object.keys(s.weekly).length}项点检</div>
      <div class="status-row"><span class="st-badge ${st}">${stLabel}</span><span class="st-badge none">本月${storeRecs.length}次</span></div>
      ${lastRec ? `<div class="last-review">最近：${lastRec.date} ${lastRec.type === 'pre' ? '会前大纲' : '会后纪要'}</div>` : ''}
    `;
    grid.appendChild(card);
  });
  document.getElementById('stDone').textContent = doneCnt;
  document.getElementById('stPending').textContent = STORES.length - doneCnt;
  document.getElementById('stRate').textContent = Math.round(doneCnt / STORES.length * 100) + '%';
  document.getElementById('headerCount').textContent = doneCnt + '/' + STORES.length;
}

  s.daily.forEach((it, i) => {

function toggleCheck(el) {

  if (el.checked) item.classList.add('checked');

}

}

function toggleFull(el) {
  const full = el.nextElementSibling;
  if (full.style.display === 'none' || !full.style.display) { full.style.display = 'block'; el.textContent = '📕 收起'; }
  else { full.style.display = 'none'; el.textContent = '📖 展开全文'; }
}

  if (!confirm('确定删除这条记录？')) return;
  _records = _records.filter(r => r.createdAt !== createdAt);
  await pushToGist();
  renderRecords(); renderStores();
  showToast('✅ 已删除并同步');
}

function renderSchedule() {

  grid.innerHTML = '';

  let totalSlots = 0, doneSlots = 0;
  STORES.forEach((s, i) => {

    const storeSch = _schedule[s.name] || [];
    const thisMonth = storeSch.filter(sl => (sl.date || '').startsWith(curMonth));

    totalSlots += thisMonth.length;
    doneSlots += done;
    const card = document.createElement('div');
    card.className = 'store-card';
    const slotsHTML = thisMonth.length > 0
      ? thisMonth.map(sl => {
          const dot = sl.status === 'done' ? '#00ff88' : sl.status === 'pending' ? '#ff9f43' : '#5a6a8a';
          return `<div class="info-row" style="margin-bottom:3px;align-items:center;">
            <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${dot};margin-right:5px;flex-shrink:0;"></span>

              <option value="done" ${sl.status === 'done' ? 'selected' : ''}>✅已完成</option>

        }).join('')
      : '<div class="info-row" style="color:var(--t3);">暂无本月排班</div>';
    card.innerHTML = `
      <div class="brand-bar" style="background:${brand.color}"></div>
      <div class="header"><span class="name">${s.name}</span><span class="brand-tag" style="background:${brand.bg};color:${brand.color}">${s.brand}</span></div>
      <div class="info-row"><span class="icon">📅</span>每周${s.day}（时间以老师预约为准）</div>
      <div class="info-row"><span class="icon">👩🏫</span>${s.teachers}</div>
      <div style="margin-top:8px;font-size:12px;color:var(--accent);font-weight:600;">本月排班（${thisMonth.length}次，已完成${done}）：</div>
      ${slotsHTML}
      <div style="margin-top:8px;display:flex;gap:4px;align-items:center;">
        <input id="quickDate_${i}" type="text" placeholder="预约日期，如：6月11日" style="flex:1;background:var(--bg1);border:1px solid #2a3055;color:var(--t1);border-radius:6px;padding:5px 8px;font-size:12px;font-family:inherit;outline:none;min-width:0;" onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='#2a3055'">
        <button onclick="event.stopPropagation();quickBook(${i})" style="background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;font-weight:700;border:none;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit;white-space:nowrap;">✅ 预约</button>
      </div>
    `;
    grid.appendChild(card);
  });
  document.getElementById('schTotal').textContent = STORES.length;
  document.getElementById('schThisMonth').textContent = totalSlots;
  document.getElementById('schNext').textContent = doneSlots;
}

async function quickBook(idx) {
  const s = STORES[idx];
  const input = document.getElementById('quickDate_' + idx);
  const date = input.value.trim();
  if (!date) { input.style.borderColor = 'var(--red)'; setTimeout(() => input.style.borderColor = '#2a3055', 1500); return; }
  if (!_schedule[s.name]) _schedule[s.name] = [];
  if (_schedule[s.name].some(sl => sl.date === date)) { input.value = ''; renderSchedule(); return; }
  _schedule[s.name].push({ date, status: 'pending', createdAt: new Date().toISOString() });
  await pushToGist();
  input.value = '';
  renderSchedule();
  showToast('✅ 预约已同步到云端');
}

async function updateSlotStatus(storeName, date, status) {
  const slots = _schedule[storeName] || [];
  const sl = slots.find(s => s.date === date);
  if (sl) sl.status = status;
  await pushToGist();
  renderSchedule(); renderStores();
}

async function deleteSlotInline(storeName, date) {
  if (!confirm('删除「' + date + '」的排班？')) return;
  _schedule[storeName] = (_schedule[storeName] || []).filter(sl => sl.date !== date);
  await pushToGist();
  renderSchedule();
  showToast('✅ 已删除并同步');
}

// ═══════════════════════════════════════════
//  投喂纪要
// ═══════════════════════════════════════════
function populateFeedForm() {
  const sel = document.getElementById('feedStore');
  sel.innerHTML = STORES.map(s => `<option value="${s.name}">${s.name}（${s.brand}）</option>`).join('');
  const now = new Date();
  document.getElementById('feedDate').value = `${now.getMonth() + 1}月${now.getDate()}日`;
}

async function saveFeed() {
  const store = document.getElementById('feedStore').value;
  const date = document.getElementById('feedDate').value;
  const type = document.getElementById('feedType').value;
  const content = document.getElementById('feedContent').value.trim();
  if (!store || !date || !content) { document.getElementById('feedMsg').textContent = '请填写完整信息'; document.getElementById('feedMsg').style.color = 'var(--red)'; return; }
  _records.push({ store, date, type, status: 'done', content, createdAt: new Date().toISOString() });
  const ok = await pushToGist();
  if (ok) {
    document.getElementById('feedMsg').textContent = '✅ 纪要已归档到云端！'; document.getElementById('feedMsg').style.color = 'var(--green)';
    document.getElementById('feedContent').value = '';
    renderStores(); showToast('✅ 已同步到云端');
  } else {
    document.getElementById('feedMsg').textContent = '❌ 保存失败'; document.getElementById('feedMsg').style.color = 'var(--red)';
  }
}

// ═══════════════════════════════════════════
//  Token 管理
// ═══════════════════════════════════════════
function showTokenDialog() {
  document.getElementById('tokenOverlay').classList.add('active');
  const st = document.getElementById('tokenStatus');
  if (getToken()) {
    st.textContent = '✅ 已配置 Token（' + getToken().slice(0, 10) + '...）';
    st.className = 'status ok';
  } else {
    st.textContent = '⚠️ 尚未配置 Token，无法保存数据';
    st.className = 'status none';
  }
}

function closeTokenDialog() {
  document.getElementById('tokenOverlay').classList.remove('active');
}

function saveToken() {
  const val = document.getElementById('tokenInput').value.trim();
  if (!val) { showToast('请粘贴 Token', true); return; }
  setToken(val);
  document.getElementById('tokenInput').value = '';
  closeTokenDialog();
  setSyncStatus('ok');
  showToast('✅ Token 已保存，可以同步数据了');
}

function clearToken() {
  localStorage.removeItem('gist_token');
  document.getElementById('tokenInput').value = '';
  document.getElementById('tokenStatus').textContent = '⚠️ 尚未配置 Token，无法保存数据';
  document.getElementById('tokenStatus').className = 'status none';
  setSyncStatus('no_token');
  showToast('Token 已清除');
}
async function init() {
  // 先从 Gist 加载数据（读取不需要 Token）
  await fetchFromGist();

  // 如果没配置 Token，提示用户
  if (!getToken()) {
    setSyncStatus('no_token');
  }

  renderStores();
  const fs = document.getElementById('filterStore');
  fs.innerHTML = '<option value="">全部门店</option>' + STORES.map(s => `<option value="${s.name}">${s.name}</option>`).join('');
  document.getElementById('headerDate').textContent = new Date().toLocaleDateString('zh-CN', { year: 'numeric', month: 'long' });
  document.getElementById('filterMonth').value = new Date().toISOString().slice(0, 7);

  // 每 30 秒自动同步一次
  setInterval(silentRefresh, 30000);
}

init();
</script>
